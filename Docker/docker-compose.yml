services:
  # =========================
  # SQL Server
  # =========================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    networks:
      - backend
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: [
        "CMD-SHELL",
        "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -Q 'SELECT 1'"
      ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  sqlserver-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - backend
    entrypoint: >
      /bin/bash -c "
      echo '⏳ Aguardando SQL Server...' &&

      echo '📌 Criando banco BancoKrt (se não existir)...' &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P 'YourStrong!Passw0rd' -Q \"
        IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'BancoKrt')
          CREATE DATABASE BancoKrt;
      \" &&

      echo '📌 Criando tabelas...' &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P 'YourStrong!Passw0rd' -d BancoKrt -Q \"
        IF NOT EXISTS (SELECT * FROM sysobjects WHERE name = 'Accounts' AND xtype = 'U')
        CREATE TABLE Accounts (
          Id UNIQUEIDENTIFIER NOT NULL PRIMARY KEY,
          HolderName NVARCHAR(200) NOT NULL,
          Cpf CHAR(11) NOT NULL,
          Status INT NOT NULL
        );
      \" &&

      echo '✅ Banco inicializado com sucesso.'
      "
    restart: "no"

  # =========================
  # Adminer (SQL no browser)
  # =========================
  adminer:
    image: adminer
    container_name: adminer
    ports:
      - "8081:8080"
    networks:
      - backend
    depends_on:
      - sqlserver

  # =========================
  # Redis
  # =========================
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - backend

  # =========================
  # Redis Insight (browser)
  # =========================
  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    ports:
      - "5540:5540"
    networks:
      - backend
    depends_on:
      - redis

  # =========================
  # Zookeeper
  # =========================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - backend

  # =========================
  # Kafka
  # =========================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    networks:
      - backend
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # =========================
  # Kafka UI (browser)
  # =========================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    networks:
      - backend
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # =========================
  # Kafka Topic Init
  # =========================
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      - kafka
    networks:
      - backend
    volumes:
      - ./kafka-init.sh:/kafka-init.sh
    command: ["/bin/bash", "/kafka-init.sh"]
    restart: "no"

volumes:
  sqlserver_data:

networks:
  backend:
    driver: bridge